<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教育赛道流量预测 · 小红书</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8f4f2; color:#1a1a1a; font-family:-apple-system,'PingFang SC',sans-serif; }

.header { background:#fff; padding:18px 40px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #FF2442; }
.header h1 { font-size:20px; color:#FF2442; font-weight:700; }
.header-right { display:flex; align-items:center; gap:16px; }
.header .meta { font-size:12px; color:#666; text-align:right; line-height:1.6; }

.container { max-width:1300px; margin:0 auto; padding:28px 40px; }

/* 赛道切换 */
.track-tabs { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; align-items:center; }
.track-btn { padding:8px 20px; border:1.5px solid #e0d8d5; background:#fff; color:#666; border-radius:999px; cursor:pointer; font-size:13px; font-family:inherit; transition:all 0.2s; font-weight:500; }
.track-btn:hover { border-color:#FF2442; color:#FF2442; }
.track-btn.active { background:#FF2442; border-color:#FF2442; color:#fff; box-shadow:0 4px 12px rgba(255,36,66,0.3); }

/* 操作按钮 */
.action-btns { display:flex; gap:10px; margin-left:auto; }
.btn-action { padding:8px 18px; border-radius:999px; font-size:13px; font-family:inherit; cursor:pointer; font-weight:600; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.btn-download-img { background:#FF2442; color:#fff; border:none; box-shadow:0 4px 12px rgba(255,36,66,0.25); }
.btn-download-img:hover { background:#e01f3c; }
.btn-import { background:#fff; color:#FF2442; border:1.5px solid #FF2442; }
.btn-import:hover { background:#fff0f2; }
#csvInput { display:none; }

.section { margin-bottom:32px; }
.section-title { font-size:16px; font-weight:700; color:#1a1a1a; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-title::before { content:''; display:block; width:4px; height:18px; background:#FF2442; border-radius:2px; }

.card { background:#fff; border-radius:16px; padding:16px 20px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.chart-box { height:420px; }

/* 同比（月环比） */
.yoy-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.yoy-card { background:#fff; border-radius:12px; padding:14px 10px; box-shadow:0 2px 8px rgba(0,0,0,0.05); text-align:center; }
.yoy-label { font-size:12px; color:#666; margin-bottom:6px; }
.yoy-value { font-size:22px; font-weight:800; }
.yoy-value.up { color:#FF2442; }
.yoy-value.down { color:#00b96b; }
.yoy-sub { font-size:11px; color:#aaa; margin-top:4px; }

/* 投放时机 */
.timing-card { background:#fff; border-radius:16px; padding:24px; box-shadow:0 2px 16px rgba(0,0,0,0.06); }
.peak-badge { display:inline-block; background:#fff0f2; color:#FF2442; border:1px solid #ffcdd3; padding:5px 14px; border-radius:999px; font-size:12px; margin:4px; font-weight:500; }
.timing-tip { font-size:14px; color:#444; margin-top:14px; line-height:2; background:#fff8f0; border-radius:12px; padding:14px 18px; }
.timing-tip span { color:#FF2442; font-weight:700; }

/* 赛道热度排行 */
.heat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
.heat-card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.heat-card h4 { font-size:13px; color:#666; font-weight:500; margin-bottom:12px; }
.heat-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.heat-rank { width:22px; height:22px; border-radius:50%; background:#FF2442; color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.heat-rank.rank2 { background:#ff7a45; }
.heat-rank.rank3 { background:#ffa940; }
.heat-rank.rankN { background:#e0d8d5; color:#999; }
.heat-name { font-size:13px; font-weight:600; flex:1; }
.heat-bar-wrap { flex:2; background:#f5f0ee; border-radius:4px; height:8px; overflow:hidden; }
.heat-bar { height:8px; border-radius:4px; background:linear-gradient(90deg,#FF2442,#ff7875); }
.heat-val { font-size:12px; color:#FF2442; font-weight:700; width:52px; text-align:right; }

/* 情报卡 */
.intel-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
.intel-card { background:#fff; border-radius:16px; padding:22px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.intel-card h3 { font-size:15px; font-weight:700; color:#FF2442; margin-bottom:14px; }
.intel-row { display:flex; justify-content:space-between; font-size:13px; padding:8px 0; border-bottom:1px solid #f5f5f5; }
.intel-row:last-of-type { border-bottom:none; }
.intel-row .key { color:#666; }
.intel-row .val { color:#1a1a1a; font-weight:500; }
.intel-quote { margin-top:14px; padding:12px 16px; background:#fff8f0; border-radius:10px; font-size:13px; color:#666; line-height:1.8; border-left:3px solid #FF2442; }
.tag { display:inline-block; background:#fff0f2; color:#FF2442; padding:4px 12px; border-radius:999px; font-size:12px; margin:3px; }


/* 内容推荐-搜索词标签云 */
.kw-note { font-size:12px; color:#aaa; margin-bottom:12px; }
.kw-tags { display:flex; flex-wrap:wrap; gap:8px; }
.kw-tag { display:inline-block; background:#fff; color:#FF2442; border:1.5px solid #ffcdd3; padding:6px 14px; border-radius:999px; font-size:13px; font-weight:500; text-decoration:none; transition:all 0.18s; }
.kw-tag:hover { background:#FF2442; color:#fff; border-color:#FF2442; }
/* 图表说明 */
.chart-note { font-size:12px; color:#999; margin-top:10px; padding:10px 14px; background:#fafafa; border-radius:8px; line-height:1.7; border-left:3px solid #e0d8d5; }
.chart-note b { color:#666; }

/* 导入弹窗 */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1000; align-items:center; justify-content:center; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:20px; padding:32px; width:480px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
.modal h3 { font-size:17px; font-weight:700; color:#1a1a1a; margin-bottom:8px; }
.modal p { font-size:13px; color:#666; margin-bottom:20px; line-height:1.7; }
.modal-btns { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
.modal-cancel { padding:10px 22px; border:1.5px solid #e0d8d5; background:#fff; color:#666; border-radius:999px; cursor:pointer; font-size:13px; font-family:inherit; }
.modal-confirm { padding:10px 22px; background:#FF2442; color:#fff; border:none; border-radius:999px; cursor:pointer; font-size:13px; font-family:inherit; font-weight:600; }
.drop-zone { border:2px dashed #ffcdd3; border-radius:12px; padding:32px; text-align:center; color:#aaa; font-size:13px; cursor:pointer; transition:all 0.2s; background:#fafafa; }
.drop-zone:hover, .drop-zone.drag-over { border-color:#FF2442; background:#fff0f2; color:#FF2442; }
.drop-zone .drop-icon { font-size:32px; margin-bottom:8px; }
.import-status { font-size:13px; margin-top:12px; color:#666; text-align:center; min-height:20px; }

/* 页脚 */
footer { text-align:center; padding:28px 40px; color:#aaa; font-size:12px; line-height:2; border-top:1px solid #f0ebe8; margin-top:8px; }
footer a { color:#FF2442; text-decoration:none; }
footer a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="header">
  <h1>🌟 教育赛道流量预测</h1>
  <div class="header-right">
    <div class="meta" id="headerMeta">数据截至 2026-04-04 &nbsp;|&nbsp; 预测至 2026-04-30<br><span id="dataSource" style="color:#aaa;font-size:11px">☁️ 加载中...</span></div>
  </div>
</div>

<div class="container">

  <div class="track-tabs" id="trackTabs">
    <button class="track-btn active" onclick="switchTrack(this,'K12学科辅导')">K12学科辅导</button>
    <button class="track-btn" onclick="switchTrack(this,'大语文')">大语文</button>
    <button class="track-btn" onclick="switchTrack(this,'STEM')">STEM</button>
    <button class="track-btn" onclick="switchTrack(this,'素质教育')">素质教育</button>
    <button class="track-btn" onclick="switchTrack(this,'英语/语言')">英语/语言</button>
    <button class="track-btn" onclick="switchTrack(this,'教辅工具')">教辅工具</button>
    <button class="track-btn" onclick="switchTrack(this,'考研')">考研</button>
    <button class="track-btn" onclick="switchTrack(this,'公考/事业编')">公考/事业编</button>
    <div class="action-btns">
      <button class="btn-action btn-import" onclick="checkImportAuth()">📂 导入数据</button>
      <button class="btn-action btn-download-img" onclick="downloadLongImage()">⬇ 下载长图</button>
    </div>
  </div>

  <div id="mainContent">
    <div class="section">
      <div class="section-title">流量趋势预测</div>
      <div class="card"><div id="chart1" class="chart-box"></div></div>
      <div class="chart-note">
        💡 各赛道 Y 轴独立，绝对数值<b>不可跨赛道比较</b>。
      </div>
    </div>

    <div class="section">
      <div class="section-title">同比上月</div>
      <div class="yoy-grid" id="yoyGrid"></div>
    </div>

    <div class="section">
      <div class="section-title">用户热搜词 · 内容选题参考</div>
      <div id="contentRec"></div>
    </div>

    <div class="section">
      <div class="section-title">投放时机建议</div>
      <div class="timing-card" id="timingCard"></div>
    </div>

    <div class="section">
      <div class="section-title">赛道情报卡</div>
      <div class="intel-grid" id="intelGrid"></div>
    </div>
  </div>

</div>

<footer>
  数据来源：小红书商业化 · 教育行业 &nbsp;|&nbsp;
  制作：<a href="https://github.com/izJiang/edu-flow-forecast" target="_blank">jiangerqi · 教育一组</a>
  &nbsp;|&nbsp;
  <a href="https://github.com/izJiang/edu-flow-forecast" target="_blank">🔗 GitHub</a>
</footer>

<!-- 导入数据弹窗 -->
<div class="modal-overlay" id="modalImport">
  <div class="modal">
    <h3>📂 导入新数据</h3>
    <p>每月1日从 RedBI 导出 2026 年最新数据 CSV，拖入此处即可更新图表。<br>格式：宽表，第一列为<b>统计日期</b>，其余列为各赛道流量。</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvInput').click()">
      <div class="drop-icon">📄</div>
      <div>点击选择 CSV 文件，或将文件拖拽到这里</div>
      <div style="font-size:11px;margin-top:6px;color:#bbb">支持 .csv 格式</div>
    </div>
    <input type="file" id="csvInput" accept=".csv" onchange="handleCSVFile(this.files[0])">
    <div class="import-status" id="importStatus"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('modalImport').classList.remove('show')">取消</button>
    </div>
  </div>
</div>

// ── 月环比计算（当月均值 vs 上月均值）──
function calcMoM(data) {
  // 当月 = 03-16 ~ 04-04（实际数据），上月 = 03-15 之前
  const actual = data.y2026_actual;
  if (!actual || actual.length < 2) return { pct: 0, thisAvg: 0, lastAvg: 0 };
  const n = actual.length;
  const half = Math.floor(n / 2);
  const thisHalf = actual.slice(half);   // 近一半（本月段）
  const lastHalf = actual.slice(0, half); // 前一半（上月段）
  const thisAvg = thisHalf.reduce((s,r)=>s+r.y,0)/thisHalf.length;
  const lastAvg = lastHalf.reduce((s,r)=>s+r.y,0)/lastHalf.length;
  const pct = lastAvg > 0 ? ((thisAvg-lastAvg)/lastAvg*100).toFixed(1) : 0;
  return { pct: parseFloat(pct), thisAvg: Math.round(thisAvg), lastAvg: Math.round(lastAvg) };
}

function renderChart(track) {
  const d = REAL_DATA[track];
  // 合并所有日期
  const allDates = [...new Set([
    ...d.y2025.map(r=>r.x),
    ...d.y2026_actual.map(r=>r.x),
    ...d.y2026_forecast.map(r=>r.x)
  ])].sort();

  const toSparse = (series) => allDates.map(x => {
    const f = series.find(r=>r.x===x);
    return f ? f.y : null;
  });

  const s25 = toSparse(d.y2025);
  const sA  = toSparse(d.y2026_actual);
  const sF  = toSparse(d.y2026_forecast);

  // markLine 数据（无动画）
  const marks = (markNodes[track]||[]).map((n,i)=>{
    const isHol = n.label.includes('节') && !n.label.includes('读书');
    const colors = ['#ff8c00','#2B7DE9','#00b96b','#9b59b6'];
    const color = isHol ? '#FF2442' : colors[i % colors.length];
    return {
      name: n.label, xAxis: n.date,
      lineStyle:{ color, width:1.5, type: isHol?'solid':'dashed' },
      label:{ color, borderColor: isHol?'#ffcdd3':'#ddd',
              backgroundColor: isHol?'rgba(255,36,66,0.06)':'rgba(255,255,255,0.92)' }
    };
  });

  chart1.setOption({
    animation: false,
    tooltip:{
      trigger:'axis',
      formatter: params => {
        const date = params[0].axisValue;
        return `<b>${date}</b><br/>` +
          params.filter(p=>p.value!=null)
                .map(p=>`<span style="color:${p.color}">●</span> ${p.seriesName}: <b>${(p.value/10000).toFixed(1)}万</b>`)
                .join('<br/>');
      }
    },
    legend:{ data:['2025同期','2026实际','2026预测'], top:6, textStyle:{fontSize:12} },
    xAxis:{
      type:'category', data:allDates,
      axisLabel:{ fontSize:11, interval:4, color:'#555' },
      axisLine:{ lineStyle:{ color:'#bbb' } }
    },
    yAxis:{
      type:'value',
      axisLabel:{ show:false },
      splitLine:{ lineStyle:{ color:'#e8e8e8' } },
      axisTick:{ show:false },
      axisLine:{ show:false }
    },
    series:[
      {
        name:'2025同期', type:'line', data:s25,
        lineStyle:{ color:'#ffb3be', width:2 },
        itemStyle:{ color:'#ffb3be' },
        symbol:'none', connectNulls:false
      },
      {
        name:'2026实际', type:'line', data:sA,
        lineStyle:{ color:'#FF2442', width:3 },
        itemStyle:{ color:'#FF2442' },
        symbol:'none', connectNulls:false,
        areaStyle:{ color:{ type:'linear',x:0,y:0,x2:0,y2:1,
          colorStops:[{offset:0,color:'rgba(255,36,66,0.18)'},{offset:1,color:'rgba(255,36,66,0)'}] } }
      },
      {
        name:'2026预测', type:'line', data:sF,
        lineStyle:{ color:'#ff8c00', width:2.5, type:'dashed' },
        itemStyle:{ color:'#ff8c00' },
        symbol:'none', connectNulls:false,
        markLine:{
          silent:true,
          animation:false,
          symbol:['none','none'],
          label:{
            position:'insideStartTop', fontSize:10, fontWeight:600,
            padding:[3,6], borderRadius:4,
            backgroundColor:'rgba(255,255,255,0.92)',
            borderColor:'#ddd', borderWidth:1, color:'#444',
            formatter: p => p.name,
          },
          lineStyle:{ type:'dashed', width:1.5 },
          data: marks
        }
      }
    ]
  }, true);
}

// ── 导入 CSV ──
function handleCSVFile(file) {
  if (!file) return;
  const status = document.getElementById('importStatus');
  status.textContent = '读取中...';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const lines = e.target.result.trim().split('\n');
      const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
      const dateIdx = headers.findIndex(h=>h.includes('统计日期')||h.includes('date')||h.toLowerCase()==='date');
      if (dateIdx<0) { status.textContent = '❌ 未找到"统计日期"列，请检查CSV格式'; return; }

      const trackCols = {
        'K12学科辅导': headers.findIndex(h=>h.includes('K12')||h.includes('k12')),
        'STEM':        headers.findIndex(h=>h.includes('STEM')||h.includes('stem')),
        '公考/事业编': headers.findIndex(h=>h.includes('公考')||h.includes('事业编')),
        '大语文':      headers.findIndex(h=>h.includes('大语文')),
        '教辅工具':    headers.findIndex(h=>h.includes('教辅')),
        '素质教育':    headers.findIndex(h=>h.includes('素质')),
        '考研':        headers.findIndex(h=>h.includes('考研')),
        '英语/语言':   headers.findIndex(h=>h.includes('英语')||h.includes('语言')),
      };

      const newActual = {};
      Object.keys(trackCols).forEach(t=>newActual[t]=[]);
      let count = 0;

      for (let i=1;i<lines.length;i++) {
        const cols = lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
        const raw = cols[dateIdx];
        if (!raw) continue;
        const ds = raw.replace(/(\d{4})[\-\/](\d{1,2})[\-\/](\d{1,2})/,'$1-$2-$3').replace(/-0?(\d)/g,(m,d)=>'-'+d.padStart(2,'0'));
        const mmdd = ds.slice(5);
        Object.entries(trackCols).forEach(([t,ci])=>{
          if (ci<0) return;
          const v = parseFloat(cols[ci]);
          if (!isNaN(v)) newActual[t].push({x:mmdd,y:Math.round(v)});
        });
        count++;
      }

      Object.keys(REAL_DATA).forEach(t=>{
        if (newActual[t] && newActual[t].length>0) {
          REAL_DATA[t].y2026_actual = newActual[t];
        }
      });

      status.textContent = `✅ 导入成功！共 ${count} 条记录`;
      setTimeout(()=>{
        document.getElementById('modalImport').classList.remove('show');
        renderChart(currentTrack); renderYOY(); renderHeat(); renderTiming(currentTrack); renderIntel(currentTrack);
      }, 1200);
    } catch(err) {
      status.textContent = '❌ 解析失败：' + err.message;
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// ── 下载长图（html2canvas 方案）──
function downloadLongImage() {
  const btn = document.querySelector('.btn-download-img');
  btn.textContent = '生成中...';
  btn.disabled = true;

  // 动态加载 html2canvas
  if (!window.html2canvas) {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload = () => doCapture(btn);
    document.head.appendChild(s);
  } else {
    doCapture(btn);
  }
}

function doCapture(btn) {
  const el = document.getElementById('mainContent');
  html2canvas(el, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#f8f4f2',
    scrollX: 0, scrollY: 0,
    windowWidth: el.scrollWidth,
    windowHeight: el.scrollHeight,
  }).then(canvas => {
    // 加顶部标题栏
    const headerH = 80;
    const final = document.createElement('canvas');
    final.width = canvas.width;
    final.height = canvas.height + headerH * 2;
    const ctx = final.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, final.width, headerH * 2);
    ctx.fillStyle = '#FF2442';
    ctx.fillRect(0, 0, final.width, 6);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = `bold ${28*2}px PingFang SC, Arial`;
    ctx.fillText('🌟 教育赛道流量预测', 40*2, 52*2);
    ctx.font = `${13*2}px PingFang SC, Arial`;
    ctx.fillStyle = '#666';
    ctx.fillText('数据来源：小红书商业化·教育行业 · 制作：jiangerqi', 40*2, 76*2);
    ctx.drawImage(canvas, 0, headerH * 2);

    const a = document.createElement('a');
    a.download = `教育赛道流量预测_${currentTrack}_${new Date().toLocaleDateString('zh')}.png`;
    a.href = final.toDataURL('image/png');
    a.click();
    btn.textContent = '⬇ 下载长图';
    btn.disabled = false;
  }).catch(err => {
    alert('截图失败：' + err.message);
    btn.textContent = '⬇ 下载长图';
    btn.disabled = false;
  });
}

// ── Supabase 加载 ──
async function loadFromSupabase() {
  const src = document.getElementById('dataSource');
  try {
    src && (src.textContent = '⏳ 加载中...');
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const r = await fetch('https://izjiang.github.io/edu-flow-forecast/data.json?t=' + Date.now(), { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    if (!data || !Object.keys(data).length) throw new Error('空数据');
    REAL_DATA = data;
    src && (src.textContent = '✅ 最新数据');
  } catch(e) {
    console.warn('data.json 加载失败，用内置数据:', e.message);
    REAL_DATA = FALLBACK_DATA;
    src && (src.textContent = '📦 内置数据');
  }
  initChart(); renderYOY(); renderHeat(); renderContent(currentTrack); renderTiming(currentTrack); renderIntel(currentTrack);
}

// ── 上传行到 Supabase ──
async function uploadToSupabase(supaRows) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/track_data', {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates'
    },
    body: JSON.stringify(supaRows)
  });
  return r.ok;
}
