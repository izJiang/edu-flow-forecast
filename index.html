  .section-title::before { content: ''; display: block; width: 4px; height: 18px; background: #FF2442; border-radius: 2px; }

  .card { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
  .chart-box { height: 320px; }

  .peak-badge { display: inline-block; background: #fff0f2; color: #FF2442; border: 1px solid #ffcdd3; padding: 5px 14px; border-radius: 999px; font-size: 12px; margin: 4px; font-weight: 500; }

  .timing-tip span { color: #FF2442; font-weight: 700; }

  .intel-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .intel-card { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .intel-card h3 { font-size: 15px; font-weight: 700; color: #FF2442; margin-bottom: 14px; }

  .intel-quote { margin-top: 14px; padding: 12px 16px; background: #fff8f0; border-radius: 10px; font-size: 13px; color: #666; line-height: 1.8; border-left: 3px solid #FF2442; }

let chart1, currentTrack = 'K12学科辅导';

function initChart() {
  chart1 = echarts.init(document.getElementById('chart1'));
  renderChart(currentTrack);
}

function renderChart(track) {
  const d = REAL_DATA[track];
  const dates2025 = d.y2025.map(r => r.x);
  const data2025  = d.y2025.map(r => r.y);
  const datesA    = d.y2026_actual.map(r => r.x);
  const dataA     = d.y2026_actual.map(r => r.y);
  const datesF    = d.y2026_forecast.map(r => r.x);
  const dataF     = d.y2026_forecast.map(r => r.y);

  // 展示窗口：上月15日 ～ 本月末
  const allDates = [...new Set([...dates2025, ...datesA, ...datesF])].sort();

  const s25 = allDates.map(x => { const i = dates2025.indexOf(x); return i >= 0 ? data2025[i] : null; });
  const sA  = allDates.map(x => { const i = datesA.indexOf(x);    return i >= 0 ? dataA[i]    : null; });
  const sF  = allDates.map(x => { const i = datesF.indexOf(x);    return i >= 0 ? dataF[i]    : null; });

  chart1.setOption({
    backgroundColor: '#fff',
    grid: { top: 44, right: 30, bottom: 60, left: 20 },
    tooltip: {
      trigger: 'axis',
      formatter: params => {
        const date = params[0].axisValue;
        return `<b>${date}</b><br/>` +
          params.filter(p => p.value != null)
                .map(p => `<span style="color:${p.color}">●</span> ${p.seriesName}`)
                .join('<br/>');
      }
    },
    legend: { data: ['2025同期', '2026实际', '2026预测'], top: 10, textStyle:{fontSize:12} },
    xAxis: {
      type: 'category',
      data: allDates,
      axisLabel: { fontSize: 11, interval: 4, color: '#555' },
      axisLine: { lineStyle: { color: '#bbb' } }
    },
    yAxis: {
      type: 'value',
      axisLabel: { show: false },
      splitLine: { lineStyle: { color: '#e8e8e8' } },
      axisTick: { show: false },
      axisLine: { show: false }
    },
    series: [
      {
        name: '2025同期',
        type: 'line',
        data: s25,
        lineStyle: { color: '#ffb3be', width: 2 },
        itemStyle: { color: '#ffb3be' },
        symbol: 'none',
        connectNulls: false
      },
      {
        name: '2026实际',
        type: 'line',
        data: sA,
        lineStyle: { color: '#FF2442', width: 3 },
        itemStyle: { color: '#FF2442' },
        symbol: 'none',
        connectNulls: false,
        areaStyle: { color: { type:'linear',x:0,y:0,x2:0,y2:1,
          colorStops:[{offset:0,color:'rgba(255,36,66,0.18)'},{offset:1,color:'rgba(255,36,66,0)'}] } }
      },
      {
        name: '2026预测',
        type: 'line',
        data: sF,
        lineStyle: { color: '#ff8c00', width: 2.5, type: 'dashed' },
        itemStyle: { color: '#ff8c00' },
        symbol: 'none',
        connectNulls: false,
        markLine: {
          silent: true,
          symbol: ['none', 'none'],
          label: {
            position: 'insideStartTop',
            fontSize: 10,
            fontWeight: 600,
            padding: [3, 6],
            borderRadius: 4,
            backgroundColor: 'rgba(255,255,255,0.92)',
            borderColor: '#ddd',
            borderWidth: 1,
            color: '#444',
            formatter: p => p.name,
          },
          lineStyle: { type: 'dashed', width: 1.5 },
          data: (markNodes[track] || []).map((n, i) => {
            // 节假日用红色，普通节点交替橙/蓝
            const isHoliday = n.label.includes('节') && !n.label.includes('读书');
            const colors = ['#ff8c00', '#2B7DE9', '#00b96b', '#9b59b6'];
            const color = isHoliday ? '#FF2442' : colors[i % colors.length];
            return {
              name: n.label,
              xAxis: n.date,
              lineStyle: { color, width: 1.5, type: isHoliday ? 'solid' : 'dashed' },
              label: { color, borderColor: isHoliday ? '#ffcdd3' : '#ddd',
                       backgroundColor: isHoliday ? 'rgba(255,36,66,0.06)' : 'rgba(255,255,255,0.92)' }
            };
          })
        }
      }
    ]
  }, true);
}

function switchTrack(btn, track) {
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTrack = track;
  renderChart(track);
  renderYOY(); renderTiming(track); renderIntel(track);
}

function renderYOY() {
  document.getElementById('yoyGrid').innerHTML = Object.entries(REAL_DATA).map(([name, d]) => {
    const yoy = d.yoy;
    return `
    <div class="yoy-card">
      <div class="yoy-label">${name}</div>
      <div class="yoy-value ${yoy >= 0 ? 'up' : 'down'}">${yoy >= 0 ? '+' : ''}${yoy}%</div>
      <div class="yoy-sub">vs 2025年同期</div>
    </div>`;
  }).join('');
}

function renderTiming(track) {
  const d = REAL_DATA[track];
  const nodes = hotNodes[track];
  const yoy = d.yoy;
  // 找预测最高点
  const forecastPeak = d.y2026_forecast.reduce((a, b) => b.y > a.y ? b : a, {x:'--', y:0});
  document.getElementById('timingCard').innerHTML = `
    <div>${nodes.map(n => `<span class="peak-badge">📅 ${n}</span>`).join('')}</div>
    <div class="timing-tip">预计 <span>${forecastPeak.x}</span> 前后流量达到峰值，建议提前 <span>3天</span> 加大预算。当前同比 ${yoy >= 0 ? '<span>+'+yoy+'%</span> 📈，建议保持或加大投放。' : '<span style="color:#999">'+yoy+'%</span> 📉，建议精准投放控制成本。'}</div>
  `;
}

function renderIntel(track) {
  const d = REAL_DATA[track];
  const nodes = hotNodes[track];
  const yoy = d.yoy;
  const coef = d.coef;
  const forecastPeak = d.y2026_forecast.reduce((a, b) => b.y > a.y ? b : a, {x:'--', y:0});
  document.getElementById('intelGrid').innerHTML = `
    <div class="intel-card">
      <h3>🎯 ${track} · 本月情报</h3>
      <div class="intel-row"><span class="key">趋势判断</span><span class="val">${yoy >= 0 ? '📈 上升' : '📉 下降'} ${Math.abs(yoy)}%</span></div>
      <div class="intel-row"><span class="key">同比系数</span><span class="val">${coef}x</span></div>
      <div class="intel-row"><span class="key">预测峰值日</span><span class="val">${forecastPeak.x}</span></div>
      <div class="intel-row"><span class="key">建议动作</span><span class="val">${yoy >= 0 ? '💪 加大预算' : '🎯 精准投放'}</span></div>
      <div class="intel-quote">${briefs[track]}</div>
    </div>
    <div class="intel-card">
      <h3>📅 本月热点节点</h3>
      ${nodes.map(n => `<div class="intel-row"><span class="key">📌</span><span class="val">${n}</span></div>`).join('')}
      <div style="margin-top:12px">${nodes.map(n => `<span class="tag">${n}</span>`).join('')}</div>
    </div>
  `;
}

window.onload = () => { initChart(); renderYOY(); renderTiming(currentTrack); renderIntel(currentTrack); };
window.onresize = () => chart1 && chart1.resize();
</script>
